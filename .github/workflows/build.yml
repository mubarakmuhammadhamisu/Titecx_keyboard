# -----------------------------------------------------------
# BUILD APK WORKFLOW
#
# This file tells GitHub:
# "Every time code is pushed, run these steps automatically."
#
# The result is a downloadable APK in the Actions tab.
# -----------------------------------------------------------

name: Build Titecx Keyboard APK

# When to run this workflow
on:
  push:
    branches: [ main ]   # runs every time you push to main branch

jobs:
  build:
    # Use GitHub's free Ubuntu Linux machine to build
    runs-on: ubuntu-latest

    steps:

      # Step 1 — Download our code onto the build machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Install Java 17 (Kotlin needs Java to compile)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3 — Install Android SDK (needed to build Android apps)
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Step 4 — Install Gradle 8.4 (the build tool)
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # Step 5 — Accept Android SDK licenses (required, non-interactive)
      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      # Step 6 — Install the SDK version our app needs
      - name: Install SDK platform
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # Step 7 — Actually build the APK
      # assembleDebug = build a debug APK (for testing, no signing needed)
      - name: Build Debug APK
        run: gradle assembleDebug

      # Step 8 — Upload the APK so we can download it
      # It appears in the Actions tab under "Artifacts"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Titecx-keyboard-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # keeps the APK available for 30 days

# These settings make Gradle use less memory and build faster on slow machines

# Maximum memory Gradle can use during build
org.gradle.jvmargs=-Xmx1024m

# Build multiple parts at the same time (faster)
org.gradle.parallel=true

# Remember previous build work to skip unchanged parts (faster rebuilds)
org.gradle.caching=true

# Use the newer faster build system
android.useAndroidX=true
